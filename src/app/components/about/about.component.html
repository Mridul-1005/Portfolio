<section id="about" class="about">
  <div class="container">
    <h2 class="section-title">About <span>Me</span></h2>

    <div class="about-content">
      <div class="about-image">
        <div class="image-wrapper">
          <img src="/assets/images/mridul.jpg" alt="Mahmudul Hasan Mridul" />
          <div class="image-border"></div>
        </div>
        <div class="experience-badge">
          <span class="years">4</span>
          <span class="text">Years of<br>Learning</span>
        </div>
      </div>

      <div class="about-info">
        <p class="bio">{{ bio }}</p>

        <div class="education-timeline">
          @for (edu of education; track edu.degree) {
            <div class="education-item">
              <div class="edu-icon">{{ edu.icon }}</div>
              <div class="edu-content">
                <h3 class="edu-degree">{{ edu.degree }}</h3>
                <p class="edu-institution">{{ edu.institution }}</p>
                <div class="edu-details">
                  <span class="edu-period">{{ edu.period }}</span>
                  <span class="edu-grade">{{ edu.grade }}</span>
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
