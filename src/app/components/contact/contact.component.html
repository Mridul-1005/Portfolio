<section id="contact" class="contact">
  <div class="container">
    <h2 class="section-title">Get In <span>Touch</span></h2>

    <div class="contact-content">
      <div class="contact-info">
        <p class="contact-intro">
          Feel free to reach out if you're looking for a developer, have a question, or just want to connect.
        </p>

        <div class="info-cards">
          @for (info of contactInfo; track info.label) {
            <a [href]="info.link" target="_blank" rel="noopener noreferrer" class="info-card">
              <span class="info-icon">{{ info.icon }}</span>
              <div class="info-content">
                <span class="info-label">{{ info.label }}</span>
                <span class="info-value">{{ info.value }}</span>
              </div>
            </a>
          }
        </div>
      </div>

      <div class="contact-form-wrapper">
        <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
          <!-- honeypot field to deter bots -->
          <input type="text" name="website" [(ngModel)]="formData.website" style="display:none" tabindex="-1" autocomplete="off" />
          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              [(ngModel)]="formData.name"
              name="name"
              placeholder="Your Name"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              [(ngModel)]="formData.email"
              name="email"
              placeholder="Your Email"
              required
            />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              [(ngModel)]="formData.message"
              name="message"
              placeholder="Your Message"
              rows="5"
              required
            ></textarea>
          </div>

          <div class="form-status">
            <div *ngIf="loading" class="status loading">Sending...</div>
            <div *ngIf="success" class="status success">Message sent — thank you!</div>
            <div *ngIf="error" class="status error">{{ error }}</div>
          </div>

          <button type="submit" class="btn btn-primary" [disabled]="loading || contactForm.invalid">
            {{ loading ? 'Sending...' : 'Send Message' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
