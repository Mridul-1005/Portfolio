<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="container">
    <a href="#home" class="logo" (click)="scrollTo($event, '#home')">
      <span class="logo-text">MH</span>
    </a>

    <ul class="nav-links" [class.active]="isMobileMenuOpen">
      @for (link of navLinks; track link.href) {
        <li>
          <a [href]="link.href" (click)="scrollTo($event, link.href)">
            {{ link.label }}
          </a>
        </li>
      }
      <li class="mobile-controls">
        <div class="color-toggle">
          <button
            class="color-btn navy"
            [class.active]="themeService.colorScheme() === 'navy'"
            (click)="themeService.setColorScheme('navy')"
            title="Navy Theme"
          >
            <span class="color-dot"></span>
          </button>
          <button
            class="color-btn charcoal"
            [class.active]="themeService.colorScheme() === 'charcoal'"
            (click)="themeService.setColorScheme('charcoal')"
            title="Charcoal Theme"
          >
            <span class="color-dot"></span>
          </button>
        </div>
        <button
          class="mode-toggle"
          (click)="themeService.toggleMode()"
          [title]="themeService.mode() === 'dark' ? 'Light Mode' : 'Dark Mode'"
        >
          @if (themeService.mode() === 'dark') {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          }
        </button>
      </li>
    </ul>

    <div class="nav-actions">
      <div class="color-toggle desktop-only">
        <button
          class="color-btn navy"
          [class.active]="themeService.colorScheme() === 'navy'"
          (click)="themeService.setColorScheme('navy')"
          title="Navy Theme"
        >
          <span class="color-dot"></span>
        </button>
        <button
          class="color-btn charcoal"
          [class.active]="themeService.colorScheme() === 'charcoal'"
          (click)="themeService.setColorScheme('charcoal')"
          title="Charcoal Theme"
        >
          <span class="color-dot"></span>
        </button>
      </div>

      <button
        class="mode-toggle desktop-only"
        (click)="themeService.toggleMode()"
        [title]="themeService.mode() === 'dark' ? 'Light Mode' : 'Dark Mode'"
      >
        @if (themeService.mode() === 'dark') {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        }
      </button>
      <a class="btn desktop-only" href="https://drive.google.com/drive/folders/1b9uOC26HCfY9X1zo6Q_6NWKxc3Dpn5Ra?dmr=1&ec=wgc-drive-%5Bmodule%5D-goto" target="_blank" rel="noopener noreferrer" style="margin-left:12px">
        Download Resume
      </a>

      <button class="mobile-toggle" (click)="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>
